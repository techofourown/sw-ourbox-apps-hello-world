name: Publish Application Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: build
        name: Build and publish hello-world
        uses: docker/build-push-action@v6
        with:
          context: ./apps/hello-world
          push: true
          tags: |
            ghcr.io/techofourown/sw-ourbox-apps-hello-world/hello-world:latest
            ghcr.io/techofourown/sw-ourbox-apps-hello-world/hello-world:sha-${{ github.sha }}
      - name: Write publish record
        run: |
          mkdir -p dist
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          record = {
              "schema": 1,
              "kind": "ourbox-application-image-publish-record",
              "app_id": "hello-world",
              "display_name": "Hello World",
              "image_repo": "ghcr.io/techofourown/sw-ourbox-apps-hello-world/hello-world",
              "default_tag": "latest",
              "pinned_ref": f"ghcr.io/techofourown/sw-ourbox-apps-hello-world/hello-world@{os.environ['DIGEST']}",
              "digest": os.environ["DIGEST"],
              "github_sha": os.environ["GITHUB_SHA"],
              "github_run_id": os.environ["GITHUB_RUN_ID"],
              "github_run_attempt": os.environ["GITHUB_RUN_ATTEMPT"],
          }
          Path("dist/hello-world.publish-record.json").write_text(
              json.dumps(record, indent=2) + "\n",
              encoding="utf-8",
          )
          PY
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
      - uses: actions/upload-artifact@v4
        with:
          name: hello-world-publish-record
          path: dist/hello-world.publish-record.json

  refresh-catalogs:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Mint org-bot token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.SEMREL_APP_ID }}
          private-key: ${{ secrets.SEMREL_APP_PRIVATE_KEY }}

      - name: Trigger downstream catalog refresh
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          for repo in sw-ourbox-catalog-demo sw-ourbox-catalog-hello-world; do
            curl -fsSL \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${APP_TOKEN}" \
              "https://api.github.com/repos/techofourown/${repo}/dispatches" \
              -d "{\"event_type\":\"refresh-from-upstream-image-publish\",\"client_payload\":{\"source_repo\":\"${GITHUB_REPOSITORY}\",\"source_sha\":\"${GITHUB_SHA}\"}}"
          done
